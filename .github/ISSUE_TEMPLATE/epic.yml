name: Epic
description: Create an Epic for large features or user stories
title: "[Epic] "
labels: ["epic"]
body:
  - type: markdown
    attributes:
      value: |
        ## Epic
        Please describe the large feature or user story you want to implement.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe what needs to be done and why
      placeholder: As a user, I want to...
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: Define the criteria that must be met for this epic to be considered complete
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
        - [ ] Criterion 3
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: Select the priority level
      options:
        - High
        - Medium
        - Low
    validations:
      required: false

  - type: textarea
    id: notes
    attributes:
      label: Additional Notes
      description: Any additional context, screenshots, or references
    validations:
      required: false
