name: Epic
description: Create an Epic for large features that span multiple Stories and Tasks
title: '[Epic] '
labels: ['epic']
body:
  - type: markdown
    attributes:
      value: |
        ## Epic
        An Epic represents a large body of work that encompasses multiple Stories.
        It defines the overall vision and success criteria for a major feature or initiative.

  - type: textarea
    id: overview
    attributes:
      label: Overview
      description: High-level description of what this Epic aims to achieve
      placeholder: |
        Provide a brief overview of the Epic:
        - What is the main goal?
        - What problem does it solve?
        - Who benefits from this?
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Define what is included and excluded from this Epic
      placeholder: |
        ### In Scope
        - Feature A
        - Feature B
        - Integration with System C

        ### Out of Scope
        - Feature X (separate Epic)
        - Advanced analytics (future iteration)
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Epic Acceptance Criteria
      description: High-level criteria that must be met for this Epic to be considered complete
      placeholder: |
        - [ ] All related Stories are completed
        - [ ] Core functionality is working end-to-end
        - [ ] Integration tests pass
        - [ ] Documentation is complete
        - [ ] Feature is deployed to production
    validations:
      required: true

  - type: textarea
    id: stories
    attributes:
      label: Related Stories
      description: List of Stories that belong to this Epic (update as Stories are created)
      placeholder: |
        - [ ] #123 - [Story] User login functionality
        - [ ] #124 - [Story] User logout functionality
        - [ ] #125 - [Story] Password reset flow
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: Select the priority level for this Epic
      options:
        - High
        - Medium
        - Low
    validations:
      required: false

  - type: textarea
    id: success-metrics
    attributes:
      label: Success Metrics
      description: How will we measure the success of this Epic?
      placeholder: |
        - User adoption rate increases by X%
        - Task completion time decreases by Y%
        - Error rate decreases to less than Z%
    validations:
      required: false

  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: List any dependencies or blockers
      placeholder: |
        - Depends on Epic #XX
        - Requires API access from Team Y
        - Blocked by infrastructure limitation Z
    validations:
      required: false

  - type: textarea
    id: notes
    attributes:
      label: Additional Notes
      description: Any additional context, design documents, or references
      placeholder: |
        - Design doc: [link]
        - Architecture diagram: [link]
        - User research: [link]
    validations:
      required: false
