name: Feature (New Feature)
description: Create a new feature implementation task
title: "[Feature] "
labels: ["feature", "task"]
body:
  - type: markdown
    attributes:
      value: |
        ## Feature Task
        Please describe the new feature you want to implement.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe what feature needs to be implemented
      placeholder: Implement...
    validations:
      required: true

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: Select the affected area (please add corresponding label manually)
      options:
        - api
        - web
        - domain
        - config
        - infra
        - db
        - Other
    validations:
      required: false

  - type: textarea
    id: checklist
    attributes:
      label: Implementation Checklist
      description: Break down the implementation into smaller steps
      placeholder: |
        - [ ] Step 1
        - [ ] Step 2
        - [ ] Step 3
    validations:
      required: false

  - type: textarea
    id: notes
    attributes:
      label: Additional Notes
      description: Any additional context, design decisions, or references
    validations:
      required: false
