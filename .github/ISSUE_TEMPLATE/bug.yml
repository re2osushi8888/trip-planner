name: Bug (Bug Fix)
description: Create a bug fix task
title: "[Bug] "
labels: ["bug", "task"]
body:
  - type: markdown
    attributes:
      value: |
        ## Bug Fix Task
        Please describe the bug you want to fix.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the bug
      placeholder: What is the bug?
    validations:
      required: true

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: Select the affected area (please add corresponding label manually)
      options:
        - api
        - web
        - domain
        - config
        - infra
        - db
        - Other
    validations:
      required: false

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: How to reproduce the bug
      placeholder: |
        1. Go to...
        2. Click on...
        3. See error...
    validations:
      required: false

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What should happen?
    validations:
      required: false

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: What actually happens?
    validations:
      required: false

  - type: textarea
    id: notes
    attributes:
      label: Additional Notes
      description: Any additional context, error logs, or screenshots
    validations:
      required: false
