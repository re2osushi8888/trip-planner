pre-commit:
  parallel: true
  commands:
    # Type checking - must run on entire project for consistency
    type-check:
      glob: '*.{ts,tsx}'
      run: pnpm type-check
      fail_text: 'Type checking failed. Fix type errors before committing.'

    # File naming conventions - validates all staged files
    ls-lint:
      run: pnpm ls-lint
      fail_text: 'File naming violations found. Check ls-lint rules.'

    # Formatting and linting with auto-fix - processes staged files only
    check-fix:
      glob: '*.{ts,tsx,js,jsx,json,md,yml,yaml}'
      run: vp check --fix
      stage_fixed: true
      fail_text: 'Code quality issues found. Review the output above.'

commit-msg:
  commands:
    # Validate commit message format
    commitlint:
      run: pnpm commitlint --edit {1}
      fail_text: "Commit message doesn't follow Conventional Commits format."

